name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Go: build, lint, test, coverage ──────────────────────────────────────────
  build:
    name: Go — build, lint, test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Verify proto stubs compile
        run: go build ./proto/...

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

      - name: go test with coverage
        run: |
          CGO_ENABLED=0 go test -race -count=1 \
            -coverprofile=coverage.out -covermode=atomic \
            ./...

      - name: Coverage threshold (≥ 25 %)
        run: |
          pct=$(go tool cover -func=coverage.out \
                | awk '/^total:/ { gsub(/%/,"",$3); print $3 }')
          echo "Total Go coverage: ${pct}%"
          awk -v p="$pct" 'BEGIN {
            if (p+0 < 25) {
              print "FAIL: coverage " p "% is below 25% threshold"
              exit 1
            }
            print "PASS: coverage " p "%"
          }'

      - name: Generate HTML coverage report
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Upload Go coverage report
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: |
            coverage.out
            coverage.html
          retention-days: 14

  # ── Rust: clippy + tests ──────────────────────────────────────────────────────
  test-rust:
    name: Rust — clippy, test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install protoc
        run: sudo apt-get update -y && sudo apt-get install -y protobuf-compiler

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            runtime-rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('runtime-rust/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo clippy
        run: cargo clippy --manifest-path runtime-rust/Cargo.toml -- -D warnings

      - name: cargo test
        run: cargo test --manifest-path runtime-rust/Cargo.toml

  # ── Angular: lint + test + coverage ──────────────────────────────────────────
  test-dashboard:
    name: Angular — lint, test, coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: ESLint
        working-directory: dashboard
        run: npx ng lint

      - name: Unit tests + coverage
        working-directory: dashboard
        run: |
          npx ng test \
            --watch=false \
            --browsers=ChromeHeadless \
            --code-coverage
        # karma.conf.js enforces the coverage threshold (50% stmt/fn/lines, 40% branch).
        # If coverage falls below it, ng test exits non-zero and this step fails.

      - name: Upload Angular coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: angular-coverage
          path: dashboard/coverage/
          retention-days: 14

  # ── Docker: only after all three suites pass ──────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [build, test-rust, test-dashboard]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build coordinator image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.coordinator
          push: false
          tags: helion-coordinator:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build node image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.node
          push: false
          tags: helion-node:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
