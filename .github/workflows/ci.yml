name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build, lint, and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Verify proto stubs compile
        run: go build ./proto/...

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

      - name: go test
        run: go test -race -count=1 ./...

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build coordinator image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.coordinator
          push: false
          tags: helion-coordinator:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build node image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.node
          push: false
          tags: helion-node:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max