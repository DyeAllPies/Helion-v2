name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Go: build, lint, test, coverage ──────────────────────────────────────────
  build:
    name: Go — build, lint, test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Verify proto stubs compile
        run: go build ./proto/...

      - name: go vet
        run: go vet ./...

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: golangci-lint
        run: $(go env GOPATH)/bin/golangci-lint run --timeout=5m

      - name: go test (all packages)
        # ./... expands to every package in the module including
        # internal/..., cmd/..., tests/integration, tests/integration/security,
        # and tests/bench. The bench package has zero TestXxx funcs (only
        # BenchmarkXxx funcs), so it compiles here but is executed by the
        # dedicated benchmark step below.
        run: go test -race -count=1 ./...

      - name: go test (benchmarks — smoke run, 1 iteration)
        # tests/bench holds Go-vs-Rust runtime benchmarks. `go test ./...`
        # above never invokes them because they are Benchmark*, not Test*.
        # Running with -bench=. -benchtime=1x guarantees every benchmark
        # compiles and executes at least once per CI run so regressions
        # surface immediately rather than on the next manual run.
        run: go test -run=^$ -bench=. -benchtime=1x ./tests/bench/...

      # ── Coverage ────────────────────────────────────────────────────────────
      # Coverage is measured in two tiers with independent thresholds:
      #
      #   internal/   ≥ 90 %  — library code, fully unit-testable
      #   cmd/        ≥ 25 %  — binary entry points dominated by I/O side
      #                         effects (net.Listen, signal.Notify, os.Exit)
      #                         that aren't worth mocking. Testable helpers
      #                         (config parsing, URL building, CLI flows)
      #                         are covered; the blob of main() is not.
      #
      # Integration tests under tests/integration/ exercise the full boot
      # path end-to-end, so the low cmd/ number does not reflect untested
      # code — only unreachable-from-unit-tests code.

      - name: go test with coverage (internal/ — 90% threshold)
        run: |
          go test -race -count=1 \
            -coverprofile=coverage-internal.out -covermode=atomic \
            ./internal/...

      - name: Internal coverage threshold (≥ 85 %)
        run: |
          pct=$(go tool cover -func=coverage-internal.out \
                | awk '/^total:/ { gsub(/%/,"",$3); print $3 }')
          echo "internal/ coverage: ${pct}%"
          awk -v p="$pct" 'BEGIN {
            if (p+0 < 85) {
              print "FAIL: internal/ coverage " p "% is below 85% threshold"
              exit 1
            }
            print "PASS: internal/ coverage " p "%"
          }'

      - name: go test with coverage (cmd/ — 25% threshold)
        run: |
          go test -race -count=1 \
            -coverprofile=coverage-cmd.out -covermode=atomic \
            ./cmd/...

      # cmd/ packages are binary entry points: most of `main()` is I/O
      # glue that's exercised by the integration and E2E suites rather
      # than unit tests. The 25% floor covers the helper functions that
      # ARE unit-testable (envOr, parseNodePins, parseBackfillFlags,
      # isBackfillSubcommand, helion-issue-op-cert run(), …). If this
      # fails, add a test for the new helper you introduced — don't
      # just lower the threshold.
      - name: Cmd coverage threshold (≥ 25 %)
        run: |
          pct=$(go tool cover -func=coverage-cmd.out \
                | awk '/^total:/ { gsub(/%/,"",$3); print $3 }')
          echo "cmd/ coverage: ${pct}%"
          awk -v p="$pct" 'BEGIN {
            if (p+0 < 25) {
              print "FAIL: cmd/ coverage " p "% is below 25% threshold"
              exit 1
            }
            print "PASS: cmd/ coverage " p "%"
          }'

      - name: Generate HTML coverage reports
        run: |
          go tool cover -html=coverage-internal.out -o coverage-internal.html
          go tool cover -html=coverage-cmd.out      -o coverage-cmd.html

      - name: Upload Go coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: |
            coverage-internal.out
            coverage-internal.html
            coverage-cmd.out
            coverage-cmd.html
          retention-days: 14

  # ── Rust: clippy + tests ──────────────────────────────────────────────────────
  test-rust:
    name: Rust — clippy, test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install protoc
        run: sudo apt-get update -y && sudo apt-get install -y protobuf-compiler

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, llvm-tools-preview

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            runtime-rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('runtime-rust/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: cargo clippy
        run: cargo clippy --manifest-path runtime-rust/Cargo.toml -- -D warnings

      # Coverage replaces the bare `cargo test` step — llvm-cov runs the same
      # tests under instrumentation and emits both a summary and an lcov file.
      #
      # Excluded from the denominator:
      #   main.rs    — binary entry point (signal/exec wiring, same rationale
      #                as Go cmd/ tier; not unit-testable in isolation)
      #   proto.rs   — generated protobuf stubs
      #   cgroups.rs — root-only Linux cgroup syscalls; cannot run in CI
      #                without privileged containers
      - name: cargo llvm-cov (test + coverage)
        run: |
          cargo llvm-cov --manifest-path runtime-rust/Cargo.toml \
            --ignore-filename-regex '(main\.rs|proto\.rs|cgroups\.rs)' \
            --lcov --output-path runtime-rust/lcov.info \
            --fail-under-lines 85

      - name: Upload Rust coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage
          path: runtime-rust/lcov.info
          retention-days: 14

  # ── Angular: lint + test + coverage ──────────────────────────────────────────
  test-dashboard:
    name: Angular — lint, test, coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: ESLint
        working-directory: dashboard
        run: npx ng lint

      # `ng test` runs tsc under the hood but only against src/**
      # (tsconfig.json explicitly excludes e2e/**). Playwright has
      # its own implicit TS compilation at test-run time, so broken
      # E2E spec types would only surface once Docker is up and the
      # test runner started. tsc --noEmit on e2e/tsconfig.json here
      # catches those early, and folding it into the dashboard job
      # reuses the already-installed Node runtime instead of paying
      # ~1 minute of runner setup for a 10-second check.
      - name: tsc --noEmit on E2E specs
        working-directory: dashboard
        run: npx tsc --noEmit -p e2e/tsconfig.json

      - name: Unit tests + coverage
        working-directory: dashboard
        run: |
          npx ng test \
            --watch=false \
            --browsers=ChromeHeadless \
            --code-coverage

      # @angular-devkit/build-angular:karma ignores karma.conf.js `check:`
      # thresholds, so we enforce them externally by parsing the generated
      # coverage HTML. Thresholds live in the script itself and match the
      # karma.conf.js block for consistency.
      - name: Enforce coverage thresholds
        run: ./scripts/check-dashboard-coverage.sh

      - name: Upload Angular coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: angular-coverage
          path: dashboard/coverage/
          retention-days: 14

  # ── E2E: build Docker images in parallel with unit tests ─────────────────────
  e2e-images:
    name: E2E — build images
    runs-on: ubuntu-latest
    # No dependencies — runs in parallel with build, test-rust, test-dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and export coordinator image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.coordinator
          tags: helion-coordinator:e2e
          outputs: type=docker,dest=/tmp/coordinator.tar
          cache-from: type=gha,scope=coordinator
          cache-to: type=gha,mode=max,scope=coordinator

      - name: Build and export node image (Go runtime)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.node
          tags: helion-node:e2e
          outputs: type=docker,dest=/tmp/node.tar
          cache-from: type=gha,scope=node
          cache-to: type=gha,mode=max,scope=node

      - name: Build and export node-rust image (Rust runtime)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.node-rust
          tags: helion-node-rust:e2e
          outputs: type=docker,dest=/tmp/node-rust.tar
          cache-from: type=gha,scope=node-rust
          cache-to: type=gha,mode=max,scope=node-rust

      - name: Upload images
        uses: actions/upload-artifact@v4
        with:
          name: e2e-images
          path: /tmp/*.tar
          retention-days: 1

  # ── E2E: full platform Playwright suite (non-ML) ───────────────────────────
  # Covers the platform / dashboard surface that doesn't need Python
  # or the iris overlay: nodes, jobs, workflows, analytics, events,
  # metrics, audit, login, security-rest, observability, navigation,
  # admin-operator-certs. The ML specs (ml-iris, ml-mnist-parallel-
  # walkthrough, ml-artifacts) live in their own jobs below —
  # splitting them keeps this job's cluster small (alpine Go + Rust
  # nodes, no MinIO, no Python image) and its runtime bounded.
  #
  # Recorded separately by a developer into docs/e2e-full-run.mp4
  # with E2E_VIDEO=1 for documentation; CI only needs the pass/fail
  # signal so E2E_VIDEO stays off.
  e2e:
    name: E2E — Playwright non-ML full suite
    runs-on: ubuntu-latest
    # Tier 2 branch B: runs in parallel with the iris → mnist
    # sequence in branch A. Needs the full tier 1 (build, tests,
    # images) since the non-ML cluster rides the pre-built tarballs.
    needs: [build, test-dashboard, test-rust, e2e-images]

    # Both profiles are needed:
    #   - analytics: gates analytics-db (PostgreSQL) that the coordinator
    #     talks to when HELION_ANALYTICS_DSN is set.
    #   - ml:        gates minio + minio-bootstrap. node1/node2 in the e2e
    #     overlay explicitly depend_on minio-bootstrap (feature 11 —
    #     Stager wires S3 at startup), so without this profile
    #     `docker compose up` errors out with
    #     "service node2 depends on undefined service minio-bootstrap".
    # Job-scoped so every `docker compose` invocation in this job (up,
    # logs, down) sees the same service graph. Mirrors what
    # scripts/run-e2e.sh does locally via its own COMPOSE_PROFILES export.
    env:
      COMPOSE_PROFILES: analytics,ml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download images
        uses: actions/download-artifact@v4
        with:
          name: e2e-images
          path: /tmp

      - name: Load images
        run: |
          docker load -i /tmp/coordinator.tar
          docker load -i /tmp/node.tar
          docker load -i /tmp/node-rust.tar
          # Tag to match what compose expects (project name "helion-v2-e2e")
          docker tag helion-coordinator:e2e helion-v2-e2e-coordinator:latest
          docker tag helion-node:e2e helion-v2-e2e-node1:latest
          docker tag helion-node-rust:e2e helion-v2-e2e-node2:latest

      - name: Start cluster (coordinator + 2 nodes)
        run: |
          mkdir -p state logs
          chmod 777 state logs

          docker compose -f docker-compose.yml -f docker-compose.e2e.yml up -d

      - name: Wait for coordinator healthy
        run: |
          echo "Waiting for coordinator healthz..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8080/healthz > /dev/null 2>&1; then
              echo "Coordinator is healthy."
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "FAIL: coordinator not healthy after 60s"
              docker compose -f docker-compose.yml -f docker-compose.e2e.yml logs
              exit 1
            fi
            sleep 2
          done

      - name: Read root token from coordinator container
        run: |
          TOKEN=$(docker exec helion-coordinator cat /app/state/root-token)
          echo "E2E_TOKEN=$TOKEN" >> "$GITHUB_ENV"
          echo "::add-mask::$TOKEN"

      - name: Wait for nodes to register
        run: |
          echo "Waiting for at least 1 healthy node..."
          for i in $(seq 1 20); do
            HEALTHY=$(curl -sf -H "Authorization: Bearer $E2E_TOKEN" \
              http://127.0.0.1:8080/nodes 2>/dev/null \
              | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          nodes=d.get('nodes',d) if isinstance(d,dict) else d
          print(sum(1 for n in nodes if n.get('healthy') or n.get('health')=='healthy'))
          " 2>/dev/null || echo 0)
            if [ "$HEALTHY" -ge 1 ]; then
              echo "$HEALTHY healthy node(s) registered."
              break
            fi
            if [ "$i" -eq 20 ]; then
              echo "FAIL: no healthy nodes after 60s"
              docker compose -f docker-compose.yml -f docker-compose.e2e.yml logs
              exit 1
            fi
            sleep 3
          done

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Install Playwright browsers
        working-directory: dashboard
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests (non-ML specs)
        working-directory: dashboard
        env:
          CI: "true"
          # E2E_TOKEN was set in GITHUB_ENV by the "Read root token" step.
          # The Playwright cluster fixture reads it to authenticate with the dashboard.
        # Explicit non-ML spec list — this job's cluster is the alpine
        # base (no Python, no MinIO, no iris overlay) so ml-* specs
        # would fail against it. The e2e-iris + e2e-mnist jobs below
        # own the ML coverage on the Python-capable iris overlay.
        run: |
          npx playwright test \
            admin-operator-certs \
            analytics \
            audit \
            events \
            jobs \
            login \
            metrics \
            navigation \
            nodes \
            observability \
            security-rest \
            workflows

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: dashboard/playwright-report/
          retention-days: 14

      - name: Upload test traces (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: dashboard/test-results/
          retention-days: 7

      - name: Dump cluster logs (on failure)
        if: failure()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml logs > cluster-logs.txt 2>&1

      - name: Upload cluster logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cluster-logs
          path: cluster-logs.txt
          retention-days: 7

      - name: Stop cluster
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml down -v

  # ── E2E: iris end-to-end ML pipeline (feature 19) ──────────────────────────
  # Two-layer acceptance for the ML pipeline:
  #   1. REST harness (run-iris-e2e.sh) — workflow → registry → lineage →
  #      serve → /predict, all via curl. Proves the backend end-to-end.
  #   2. Playwright spec (ml-iris.spec.ts) — same pipeline state,
  #      asserted through the dashboard: Pipelines list, DAG detail
  #      with four job cards, Datasets, Models with lineage + metrics,
  #      Services chip=READY. Proves the frontend renders what the
  #      backend produced.
  #
  # Both layers ride the same cluster (coordinator + 2 Python-capable
  # iris nodes + MinIO + Postgres). The REST harness keeps the cluster
  # up (IRIS_SKIP_TEARDOWN=1) so the Playwright run reuses its state;
  # a final `docker compose down -v` step tears down regardless of
  # pass/fail. This halves the overall CI time vs. running the two
  # layers in separate jobs.
  e2e-iris:
    name: E2E — iris pipeline
    runs-on: ubuntu-latest
    # Tier 2 branch A, step 1: iris is the fast minimal-ML gate.
    # Needs tier-1 suites; e2e-mnist below chains onto this job so
    # a red iris shortcuts the longer MNIST run.
    needs: [build, test-dashboard, test-rust, e2e-images]
    env:
      COMPOSE_PROFILES: analytics,ml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install submit.py dep
        run: pip install pyyaml

      - name: Run iris REST acceptance harness (keeps cluster up)
        # The script builds Dockerfile.node-python on demand (not in the
        # pre-built e2e-images tarballs since only ML-pipeline runs need
        # the ~300MiB sklearn/pandas image). IRIS_SKIP_TEARDOWN=1 leaves
        # the cluster running so the Playwright step below can reuse it.
        run: IRIS_SKIP_TEARDOWN=1 bash scripts/run-iris-e2e.sh

      - name: Use Node.js (for Playwright)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Install Playwright browsers
        working-directory: dashboard
        run: npx playwright install --with-deps chromium

      - name: Run Playwright iris spec against live cluster
        working-directory: dashboard
        # E2E_TOKEN is read from the coordinator container's root-token
        # file — the cluster.fixture.ts resolution chain accepts either
        # an env var or a docker exec fallback.
        run: |
          export E2E_TOKEN=$(docker exec helion-coordinator cat /app/state/root-token)
          npx playwright test ml-iris --reporter=github

      - name: Upload iris Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: iris-playwright-report
          path: dashboard/playwright-report/
          retention-days: 7

      - name: Upload iris cluster logs (on failure)
        if: failure()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.iris.yml logs > iris-cluster-logs.txt 2>&1 || true

      - name: Upload iris cluster-log artifact (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: iris-cluster-logs
          path: iris-cluster-logs.txt
          retention-days: 7

      - name: Tear down iris cluster
        if: always()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.iris.yml down -v || true

  # ── E2E: MNIST parallel-heterogeneous pipeline (features 21 + 40 + 42 + 43) ─
  # The iris job proves the MINIMAL ML pipeline works. This job
  # proves the full orchestration story:
  #   - Parallel sibling dispatch (feature 42): train_light ‖
  #     train_heavy, different runtimes, overlapping
  #     [dispatched_at, finished_at] intervals asserted.
  #   - Heterogeneous scheduling (feature 21): jobs pinned by
  #     runtime=go|rust selector; iris-node-2 (Go Python) and
  #     mnist-node-rust (Rust Python) both light up.
  #   - Workflow-level analytics (feature 40 + 40b + 40c):
  #     workflow_outcomes row with job_count=5 / duration_ms /
  #     tags round-trip via /api/analytics/ml-runs.
  #   - Asymmetric variant training (feature 43): light=1000 rows,
  #     heavy=20000 rows; observable wall-clock gap.
  #
  # Runs on the same iris overlay the iris job uses (coordinator +
  # 2 Go-Python nodes + 1 Rust-Python node + MinIO + Postgres).
  # Takes ~2 minutes of cluster time on CI for the full walkthrough.
  # Chained AFTER e2e-iris in the same tier-2 branch (branch A):
  # iris is the quicker minimum-ML gate; if it's red the longer
  # MNIST run is almost certainly broken too, so short-circuiting
  # saves ~2 minutes of runner time + ~300 MiB of image rebuild.
  # Branch B (non-ML full e2e) runs independently in parallel.
  e2e-mnist:
    name: E2E — MNIST parallel pipeline
    runs-on: ubuntu-latest
    needs: [e2e-iris]
    env:
      COMPOSE_PROFILES: analytics,ml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install host deps (for submit.py, if needed)
        run: pip install pyyaml

      - name: Build + start iris-overlay cluster
        # The MNIST walkthrough needs BOTH node-python and
        # node-python-rust images (pipeline fork pins train_light
        # to runtime=go + train_heavy to runtime=rust). The iris
        # overlay ships both.
        run: |
          mkdir -p state logs
          chmod 777 state logs
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.iris.yml up -d --build

      - name: Wait for all four containers healthy
        run: |
          for i in $(seq 1 60); do
            HEALTHY=$(docker compose -p helion-v2-e2e ps --format json 2>/dev/null \
              | python3 -c "
          import json, sys
          rows=[json.loads(l) for l in sys.stdin if l.strip()]
          want={'helion-coordinator','helion-node-1','helion-node-2','helion-node-rust'}
          n=sum(1 for r in rows if r['Name'] in want and 'healthy' in r.get('Status',''))
          print(n)" 2>/dev/null || echo 0)
            if [ "$HEALTHY" -ge 4 ]; then
              echo "4/4 essential containers healthy."
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "FAIL: only $HEALTHY/4 containers healthy after 120s"
              docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.iris.yml logs --tail 200
              exit 1
            fi
            sleep 2
          done

      - name: Set up Node.js (for Playwright)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Install Playwright browsers
        working-directory: dashboard
        run: npx playwright install --with-deps chromium

      - name: Run MNIST parallel walkthrough
        working-directory: dashboard
        env:
          # E2E_RECORD_MNIST_PARALLEL=1 un-skips the walkthrough
          # test (it's opt-in because it takes ~1.5 minutes). CI
          # doesn't need E2E_VIDEO=1 — videos are recorded by a
          # developer and checked into docs/ separately.
          E2E_RECORD_MNIST_PARALLEL: "1"
        run: |
          export E2E_TOKEN=$(docker exec helion-coordinator cat /app/state/root-token)
          npx playwright test ml-mnist-parallel-walkthrough --reporter=github

      - name: Upload MNIST Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mnist-playwright-report
          path: dashboard/playwright-report/
          retention-days: 7

      - name: Upload MNIST cluster logs (on failure)
        if: failure()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.iris.yml logs > mnist-cluster-logs.txt 2>&1 || true

      - name: Upload MNIST cluster-log artifact (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mnist-cluster-logs
          path: mnist-cluster-logs.txt
          retention-days: 7

      - name: Tear down MNIST cluster
        if: always()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml -f docker-compose.iris.yml down -v || true

  # ── Snyk: dependency and container vulnerability scan ────────────────────────
  snyk:
    name: Snyk — dependency & container scan
    runs-on: ubuntu-latest
    needs: [e2e, e2e-iris, e2e-mnist]
    permissions:
      security-events: write  # required to upload SARIF results

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Set up Snyk
        uses: snyk/actions/setup@master

      - name: Snyk test — Go dependencies
        run: snyk test --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk monitor — track in Snyk UI
        run: snyk monitor
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build coordinator image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.coordinator
          push: false
          load: true
          tags: helion-coordinator:${{ github.sha }}
          cache-from: type=gha

      - name: Snyk container test — coordinator image
        run: snyk container test helion-coordinator:${{ github.sha }} --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  # ── Docker: only after all E2E suites pass ───────────────────────────────────
  # Gates on full + iris + MNIST so a regression in any of the three
  # paths blocks the release image. Skip listing `snyk` explicitly —
  # Snyk already depends on all three E2E jobs, so "needs: snyk"
  # would be an implicit no-op. Keeping this list flat makes the
  # gating obvious when debugging a failed run.
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [e2e, e2e-iris, e2e-mnist]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build coordinator image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.coordinator
          push: false
          tags: helion-coordinator:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build node image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.node
          push: false
          tags: helion-node:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build dashboard image
        uses: docker/build-push-action@v6
        with:
          context: dashboard
          file: dashboard/Dockerfile
          push: false
          tags: helion-dashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
