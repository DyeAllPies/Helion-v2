# .github/workflows/dashboard.yml
#
# CI pipeline for the Angular dashboard (Phase 3).
# Runs on every push/PR that touches dashboard/** or this workflow file.
#
# Jobs:
#   lint-and-test — npm ci, ng lint, ng test (headless Chrome)
#   build         — ng build --configuration production
#   docker        — build + push dashboard Docker image (tagged with git SHA)

name: Dashboard CI

on:
  push:
    branches: ["main", "dev"]
    paths:
      - "dashboard/**"
      - ".github/workflows/dashboard.yml"
  pull_request:
    paths:
      - "dashboard/**"
      - ".github/workflows/dashboard.yml"

defaults:
  run:
    working-directory: dashboard

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/helion-dashboard
  NODE_VERSION: "20"

jobs:
  # ── Lint & unit tests ──────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx ng lint

      - name: Unit tests (headless)
        run: npx ng test --watch=false --browsers=ChromeHeadless --code-coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: dashboard/coverage/

  # ── Production build ────────────────────────────────────────────────────────
  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        run: npx ng build --configuration production

      - name: Upload dist artefact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: dashboard/dist/helion-dashboard/
          retention-days: 7

  # ── Docker image ────────────────────────────────────────────────────────────
  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: build
    # Only push on main branch pushes (not PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: dashboard
          file:    dashboard/Dockerfile
          push:    true
          tags:    ${{ steps.meta.outputs.tags }}
          labels:  ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
