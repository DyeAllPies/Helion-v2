# dashboard/nginx.conf
# Serves the Angular production build and reverse-proxies /api and /ws to the coordinator.

worker_processes  auto;

events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  gzip          on;
  gzip_types    text/plain text/css application/javascript application/json application/wasm;

  # ── Security headers ─────────────────────────────────────────────────────────
  add_header X-Frame-Options          DENY             always;
  add_header X-Content-Type-Options   nosniff          always;
  add_header Referrer-Policy          no-referrer      always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  # CSP: no inline scripts, no eval, same-origin only (satisfies §9.3 of design doc).
  # connect-src uses 'self' only — all XHR/fetch/WebSocket traffic is proxied through
  # Nginx on the same origin, so there is no need to permit external ws:/wss: hosts.
  add_header Content-Security-Policy
    "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'self';"
    always;

  upstream coordinator {
    server ${COORDINATOR_HOST}:${COORDINATOR_PORT};
  }

  server {
    listen 80;
    server_name _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ── Angular SPA ─────────────────────────────────────────────────────────────
    location / {
      try_files $uri $uri/ /index.html;
      expires 1h;
      add_header Cache-Control "public, must-revalidate";
    }

    # Hashed assets (ng build --output-hashing=all) can be cached forever
    location ~* \.[0-9a-f]{8,}\.(js|css|woff2?)$ {
      expires max;
      add_header Cache-Control "public, immutable";
    }

    # ── REST API proxy → coordinator ─────────────────────────────────────────────
    #
    # Feature 23 — the coordinator listens on TLS by default with the
    # hybrid X25519+ML-KEM-768 curve preferences, so the Nginx upstream
    # is https://. The CA bundle must be mounted into the Nginx
    # container at /etc/nginx/coord-ca.pem (see
    # Dockerfile.dashboard / docker-compose overlay). proxy_ssl_name
    # pins the SNI hostname to the cert's SAN.
    #
    # Dev-only: if the coordinator is started with HELION_REST_TLS=off,
    # flip this block back to plain http:// and drop the ssl_* lines.
    # Production must not ship with that flag set.
    location /api/ {
      proxy_pass                     https://coordinator/;
      proxy_ssl_verify               on;
      proxy_ssl_trusted_certificate  /etc/nginx/coord-ca.pem;
      proxy_ssl_server_name          on;
      proxy_ssl_name                 coordinator;
      proxy_http_version             1.1;
      proxy_set_header               Host              $host;
      proxy_set_header               X-Real-IP         $remote_addr;
      proxy_set_header               X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_read_timeout             30s;
    }

    # ── WebSocket proxy → coordinator ────────────────────────────────────────────
    # Same TLS stance as /api/ — the same coordinator listener handles
    # both HTTP and WebSocket upgrades, so the upstream scheme is
    # identical.
    location /ws/ {
      proxy_pass                     https://coordinator/ws/;
      proxy_ssl_verify               on;
      proxy_ssl_trusted_certificate  /etc/nginx/coord-ca.pem;
      proxy_ssl_server_name          on;
      proxy_ssl_name                 coordinator;
      proxy_http_version             1.1;
      proxy_set_header               Upgrade    $http_upgrade;
      proxy_set_header               Connection "Upgrade";
      proxy_set_header               Host       $host;
      proxy_read_timeout             3600s;   # keep WS alive for up to 1 hour
    }

    # ── Health probe ─────────────────────────────────────────────────────────────
    location /healthz {
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }
  }
}
