syntax = "proto3";

package helion;

option go_package = "github.com/DyeAllPies/Helion-v2/proto";

import "coordinator.proto";

// ResourceLimits constrains a job's CPU and memory usage via cgroup v2 (Rust runtime).
// Zero values mean "no limit".
message ResourceLimits {
  uint64 memory_bytes  = 1; // maximum resident memory in bytes
  uint64 cpu_quota_us  = 2; // CPU quota per period in microseconds
  uint64 cpu_period_us = 3; // accounting period in microseconds (default 100000)
}

// ArtifactBinding is an artifact-store object attached to a job, either as
// an input (downloaded before the command runs) or as an output (uploaded
// after the command exits 0). See internal/artifacts for URI semantics.
message ArtifactBinding {
  // Logical name, surfaced to the job as HELION_INPUT_<NAME> or
  // HELION_OUTPUT_<NAME>. Must be a valid shell identifier ([A-Z_][A-Z0-9_]*).
  string name       = 1;
  // Artifact URI. For inputs: where the node pulls from.
  // For outputs: set by the node after upload and recorded in the
  // terminal event payload — callers leave it empty on submit.
  string uri        = 2;
  // Path relative to the job's working directory. Must stay inside
  // working_dir; absolute paths and ".." segments are rejected.
  string local_path = 3;
  // Expected SHA-256 (lower-hex). Populated only on inputs whose URI
  // was resolved from an upstream's ResolvedOutput — the coordinator
  // knows the digest at resolve time. Empty on plain-URI inputs where
  // no digest has been committed. When present, the node's stager
  // verifies the download against this digest and refuses the job
  // if the bytes don't match.
  string sha256     = 4;
}

message DispatchRequest {
  string          job_id          = 1;
  string          command         = 2;
  repeated string args            = 3;
  map<string, string> env         = 4;
  int64           timeout_seconds = 5;
  ResourceLimits  limits          = 6;

  // Step 2 — ML pipeline fields.
  string                       working_dir   = 7;  // empty = per-job temp dir
  repeated ArtifactBinding     inputs        = 8;  // staged before run
  repeated ArtifactBinding     outputs       = 9;  // uploaded after success
  map<string, string>          node_selector = 10; // advisory; enforced by coordinator scheduler

  // Whole-GPU reservation. The node-side runtime's GPU allocator
  // claims `gpus` device indices from the free pool and sets
  // CUDA_VISIBLE_DEVICES on the subprocess env. 0 on CPU jobs.
  uint32                       gpus          = 11;
}

message DispatchAck {
  string job_id    = 1;
  bool   accepted  = 2;
  string error     = 3;
}

message CancelRequest {
  string job_id  = 1;
  string reason  = 2;
}

message NodeMetrics {
  string node_id        = 1;
  int32  running_jobs   = 2;
  int32  total_jobs     = 3;
  double cpu_percent    = 4;
  double mem_percent    = 5;
  int64  uptime_seconds = 6;
}

message Empty {}

service NodeService {
  rpc Dispatch(DispatchRequest) returns (DispatchAck);
  rpc Cancel(CancelRequest)     returns (helion.Ack);
  rpc GetMetrics(Empty)         returns (NodeMetrics);
}