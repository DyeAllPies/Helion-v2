// proto/coordinator.proto
//
// Services and messages exposed by the Helion coordinator.
//
// IMPORTANT: The generated .pb.go files in this directory were hand-edited
// in early phases to add fields (e.g. JobResult.Success, ExitCode) that
// were not in the .proto. These fields have since been added to the .proto
// to bring it back in sync. Always regenerate after editing .proto files
// and verify the build compiles cleanly.
//
// Regenerate with (from repo root):
//   protoc --go_out=proto --go_opt=paths=source_relative \
//          --go-grpc_out=proto --go-grpc_opt=paths=source_relative \
//          --proto_path=proto coordinator.proto

syntax = "proto3";

package helion;

option go_package = "github.com/DyeAllPies/Helion-v2/proto";

import "google/protobuf/timestamp.proto";

// ============================================================================
// CoordinatorService — services the coordinator exposes to node agents
// ============================================================================

service CoordinatorService {
  // Register is called once by a node agent on startup.
  // The coordinator records the node and returns a signed certificate.
  rpc Register(RegisterRequest) returns (RegisterResponse);

  // Heartbeat is a long-lived client-streaming RPC.
  // The node agent sends HeartbeatMessage at a fixed interval (default 10 s).
  // The coordinator acknowledges each message with a HeartbeatAck, which may
  // carry a NodeCommand (e.g. shutdown, config update).
  //
  // Design note: the coordinator never initiates contact with nodes.
  // All health information flows from node → coordinator via this stream.
  // This eliminates the v1 CheckHealth() deadlock by architectural choice.
  rpc Heartbeat(stream HeartbeatMessage) returns (stream HeartbeatAck);

  // ReportResult is called by the node when a job completes, fails, or times out.
  rpc ReportResult(JobResult) returns (Ack);

  // StreamLogs is a client-streaming RPC; the node sends log chunks in real
  // time as the job runs.  The coordinator stores them and forwards to the
  // dashboard WebSocket.
  rpc StreamLogs(stream LogChunk) returns (Ack);

  // ReportServiceEvent is called by the node on service readiness state
  // transitions for long-running jobs (feature 17 inference services).
  // Unary rather than streaming because events are edge-triggered
  // (ready <-> unhealthy) and low-frequency compared to log/heartbeat.
  rpc ReportServiceEvent(ServiceEvent) returns (Ack);
}

// ============================================================================
// Register
// ============================================================================

message RegisterRequest {
  // Stable identifier chosen by the node (e.g. hostname + port).
  string node_id = 1;

  // Network address the coordinator should use to dispatch jobs.
  // Format: "host:port".
  string address = 2;

  // DER-encoded X.509 certificate presented by the node for cert pinning and
  // ML-DSA out-of-band signature verification.
  // Empty on first registration if the node has no existing certificate.
  bytes certificate = 3;

  // Free-form labels the scheduler uses for node_selector matching.
  // Sources on the node side: HELION_LABEL_* env vars (operator set)
  // plus best-effort auto-detection (gpu=<model> from nvidia-smi,
  // os=linux|darwin|windows, arch=amd64|arm64). Persisted on the
  // coordinator's Node record; never mutated after registration.
  map<string, string> labels = 4;
}

message RegisterResponse {
  // DER-encoded signed X.509 certificate for this node.
  bytes cert_der = 1;

  // DER-encoded coordinator CA certificate so the node can verify future RPCs.
  bytes ca_cert_der = 2;

  // Heartbeat interval the node should use.  The coordinator sets this
  // cluster-wide; nodes must not use a self-chosen interval.
  int64 heartbeat_interval_seconds = 3;

  // Echoed node ID (used by tests and simple clients).
  string node_id = 4;

  // PEM-encoded signed certificate + private key for the node's gRPC server.
  // Issued by the coordinator's CA so dispatchers can verify node identity.
  bytes signed_certificate = 5;
}

// ============================================================================
// Heartbeat
// ============================================================================

message HeartbeatMessage {
  string node_id   = 1;
  string address   = 2;

  // Current number of jobs actively running on this node.
  int32 running_jobs = 3;

  // Monotonically increasing sequence number.  The coordinator can detect
  // dropped messages by checking for gaps.
  uint64 seq = 4;

  google.protobuf.Timestamp sent_at = 5;

  // Node capacity — reported on every heartbeat so the coordinator can
  // make resource-aware scheduling decisions.
  uint32 cpu_millicores     = 6;  // total CPU capacity (e.g., 4000 = 4 cores)
  uint64 total_memory_bytes = 7;  // total memory in bytes
  uint32 max_slots          = 8;  // max concurrent job slots
  // Whole-GPU count — no MIG slicing, no fractional sharing. Zero on
  // CPU-only nodes; the scheduler uses this as a bin-packing
  // dimension alongside CPU/memory/slots. Per-device attributes
  // (memory, model) are carried via node labels, not here.
  uint32 total_gpus         = 9;
}

message HeartbeatAck {
  uint64 seq = 1; // echoes the HeartbeatMessage.seq being acknowledged

  // Optional command for the node.  Empty means "nothing to do".
  NodeCommand command = 2;
}

// NodeCommand is an instruction the coordinator can piggyback on a HeartbeatAck.
enum NodeCommand {
  NODE_COMMAND_NONE     = 0;
  NODE_COMMAND_SHUTDOWN = 1; // coordinator requests graceful node shutdown
  NODE_COMMAND_REJOIN   = 2; // coordinator requests re-registration
}

// ============================================================================
// Job result reporting
// ============================================================================

message JobResult {
  string job_id   = 1;
  string node_id  = 2;
  bool   success  = 3;  // true if exit code 0
  int32  exit_code = 4;
  string error    = 5;  // populated when success == false
  int64  started_at = 6; // Unix nanoseconds
  google.protobuf.Timestamp finished_at = 7;

  // runtime identifies the backend that executed the job ("go" or "rust").
  string runtime = 8;

  // Step 2 — resolved artifact outputs from the node's stager. Populated
  // only on successful runs (the stager skips uploads otherwise), one
  // entry per binding declared on the original Job.Outputs.
  repeated ArtifactOutput outputs = 9;
}

// ServiceEvent is the node's readiness signal for a long-running
// service job. Emitted on state transitions only (ready ↔ unhealthy),
// not on every probe tick.
message ServiceEvent {
  string job_id               = 1;
  string node_id              = 2;
  string node_address         = 3; // e.g. "10.0.0.4:8080" for upstream lookup
  uint32 port                 = 4; // the port the service is bound to
  string health_path          = 5; // mirrored for the lookup response
  bool   ready                = 6; // true = ready, false = unhealthy
  uint32 consecutive_failures = 7; // 0 on ready; probe-failure streak on unhealthy
  google.protobuf.Timestamp occurred_at = 8;
}

// ArtifactOutput is a resolved reference to an artifact uploaded by the
// node agent after a job exits zero. Name matches the binding declared
// at submit time; URI is what the artifact store assigned.
message ArtifactOutput {
  string name      = 1;
  string uri       = 2;
  int64  size      = 3;
  string sha256    = 4;
  string local_path = 5; // original working-directory-relative path
}

enum JobStatus {
  JOB_STATUS_UNKNOWN      = 0;
  JOB_STATUS_PENDING      = 1;
  JOB_STATUS_DISPATCHING  = 2;
  JOB_STATUS_RUNNING      = 3;
  JOB_STATUS_COMPLETED    = 4;
  JOB_STATUS_FAILED       = 5;
  JOB_STATUS_TIMEOUT      = 6;
  JOB_STATUS_LOST         = 7;
}

// ============================================================================
// Log streaming
// ============================================================================

message LogChunk {
  string job_id  = 1;
  string node_id = 2;
  bytes  data    = 3; // raw stdout/stderr bytes
  uint64 seq     = 4; // chunk sequence number for ordering on reassembly
  google.protobuf.Timestamp sent_at = 5;
}

// ============================================================================
// Shared types
// ============================================================================

// Ack is a minimal acknowledgement for one-way RPCs.
message Ack {
  bool ok = 1;
}

// Node is the persisted record for a registered worker node.
// Stored under nodes/{address} in BadgerDB.
message Node {
  string node_id  = 1;
  string address  = 2;
  bool   healthy  = 3;

  // last_seen is the wall-clock time of the most recent heartbeat received.
  // The coordinator derives health from this: healthy iff
  // now - last_seen < 2 × heartbeat_interval.
  google.protobuf.Timestamp last_seen = 4;

  // running_jobs is the node's self-reported count from the last heartbeat.
  int32 running_jobs = 5;

  google.protobuf.Timestamp registered_at = 6;

  // Labels reported at registration time; used by the scheduler's
  // node_selector filter. Frozen after Register — re-registering with
  // a different label set requires a fresh certificate.
  map<string, string> labels = 7;
}

// Job is the persisted record for a scheduled job.
// Stored under jobs/{id} in BadgerDB.
message Job {
  string    id      = 1;
  string    node_id = 2;  // address of the node this was dispatched to
  string    command = 3;
  repeated string args = 4;
  JobStatus status  = 5;
  google.protobuf.Timestamp created_at    = 6;
  google.protobuf.Timestamp dispatched_at = 7;
  google.protobuf.Timestamp finished_at   = 8;
  string error = 9; // populated for FAILED / TIMEOUT / LOST

  // env holds arbitrary key-value pairs forwarded to the job process.
  map<string, string> env = 10;

  // timeout_seconds caps how long a job may run. 0 means no limit.
  int64 timeout_seconds = 11;

  // runtime records which runtime backend executed the job ("go" or "rust").
  // Set at dispatch time based on the target node's configured runtime.
  string runtime = 12;
}

// AuditEvent is written to audit/{timestamp}-{id} on every security-relevant
// or job-lifecycle event.  Append-only; never mutated after write.
message AuditEvent {
  string event_type = 1; // e.g. "node.registered", "job.dispatched"
  string actor      = 2; // node_id or "coordinator"
  string target     = 3; // job_id or node_id being acted on
  string detail     = 4; // human-readable summary
  google.protobuf.Timestamp occurred_at = 5;
}
