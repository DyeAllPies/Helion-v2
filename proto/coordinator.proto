syntax = "proto3";

package helion;

option go_package = "github.com/DyeAllPies/Helion-v2/proto";

message RegisterRequest {
  string node_id     = 1;
  string address     = 2;
  bytes  certificate = 3;
}

message RegisterResponse {
  string node_id            = 1;
  bytes  signed_certificate = 2;
  string error              = 3;
}

message HeartbeatMessage {
  string node_id      = 1;
  int64  timestamp    = 2;
  int32  running_jobs = 3;
  double cpu_percent  = 4;
  double mem_percent  = 5;
}

message NodeCommand {
  enum Type {
    NOOP     = 0;
    SHUTDOWN = 1;
    DRAIN    = 2;
  }
  Type   type    = 1;
  string payload = 2;
}

message JobResult {
  string job_id      = 1;
  string node_id     = 2;
  bool   success     = 3;
  int32  exit_code   = 4;
  string error       = 5;
  int64  started_at  = 6;
  int64  finished_at = 7;
}

message LogChunk {
  string job_id  = 1;
  string node_id = 2;
  bytes  data    = 3;
  int64  seq     = 4;
}

message Ack {
  bool   ok    = 1;
  string error = 2;
}

service CoordinatorService {
  rpc Register(RegisterRequest)                        returns (RegisterResponse);
  rpc Heartbeat(stream HeartbeatMessage)               returns (stream NodeCommand);
  rpc ReportResult(JobResult)                          returns (Ack);
  rpc StreamLogs(stream LogChunk)                      returns (Ack);
}