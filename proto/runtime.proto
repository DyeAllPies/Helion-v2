// proto/runtime.proto
//
// IPC protocol between the Go node agent and the Rust runtime process.
// Transport: Unix domain socket.
// Framing:   [4-byte big-endian msg_type][4-byte big-endian payload_length][payload]
// Payload:   proto3 wire-encoded message matching the type indicated by msg_type.
//
// Message type constants:
//   1 = RunRequest
//   2 = RunResponse
//   3 = CancelRequest
//   4 = CancelResponse
//
// Regenerate Go stubs:
//   protoc --go_out=proto --go_opt=paths=source_relative \
//          --proto_path=proto runtime.proto
//
// Regenerate Rust stubs (handled automatically by runtime-rust/build.rs).

syntax = "proto3";

package helion;

option go_package = "github.com/DyeAllPies/Helion-v2/proto";

// ResourceLimits constrains a job's CPU and memory usage on Linux via cgroup v2.
// Zero values mean "no limit".
message ResourceLimits {
  uint64 memory_bytes  = 1; // maximum resident memory in bytes
  uint64 cpu_quota_us  = 2; // CPU quota per period in microseconds
  uint64 cpu_period_us = 3; // accounting period in microseconds (default 100000)
}

// RunRequest asks the Rust runtime to execute a job.
message RunRequest {
  string              job_id          = 1;
  string              command         = 2;
  repeated string     args            = 3;
  map<string, string> env             = 4;
  int64               timeout_seconds = 5;
  ResourceLimits      limits          = 6;

  // Working directory the runtime chdir's into before exec.
  // Empty means "inherit the node agent's cwd" (legacy pre-staging behaviour).
  // Populated by the Go-side staging layer (internal/staging) with a per-job
  // directory so the job cannot observe another job's files.
  string              working_dir     = 7;
}

// RunResponse reports the outcome of a completed (or killed) job.
message RunResponse {
  string job_id      = 1;
  int32  exit_code   = 2;
  bytes  stdout      = 3;
  bytes  stderr      = 4;
  string error       = 5; // set on exec failure or internal error
  string kill_reason = 6; // "OOMKilled" | "Timeout" | "Seccomp" | ""
}

// CancelRequest asks the runtime to terminate a running job.
message CancelRequest {
  string job_id = 1;
}

// CancelResponse reports whether the cancellation was accepted.
message CancelResponse {
  bool   ok    = 1;
  string error = 2;
}