# docker-compose.e2e.yml
#
# E2E test overlay — exposes the coordinator HTTP API on host port 8080
# and writes the root token to a mounted volume so Playwright can read it.
#
# IMPORTANT: This overlay replaces the host bind mount (./state) with a
# named Docker volume (e2e-state) so E2E tests use isolated storage and
# never read or pollute the user's local BadgerDB data. The volume is
# removed by `docker compose down -v`, giving each test run a clean DB.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.e2e.yml up -d
#   # wait for healthy, then run:  npx playwright test
#   docker compose -f docker-compose.yml -f docker-compose.e2e.yml down -v

name: helion-v2-e2e

volumes:
  e2e-state: {}

services:
  coordinator:
    # NOTE: compose merge REPLACES the ports array, so we must list ALL
    # ports here — not just the ones being added.  Base has 9090 (gRPC);
    # this overlay adds 8080 (HTTP API for the dashboard).
    ports:
      - "127.0.0.1:9090:9090"   # gRPC
      - "127.0.0.1:8080:8080"   # HTTP API
    environment:
      - HELION_SCHEDULER=roundrobin
      - HELION_ROTATE_TOKEN=false
      - HELION_TOKEN_FILE=/app/state/root-token
      - HELION_DB_PATH=/app/state/db
      - HELION_EXTRA_SANS=coordinator
      - HELION_CA_FILE=/app/state/ca.pem
    volumes:
      - e2e-state:/app/state
      - ./logs:/app/logs

  node1:
    environment:
      - PORT=8080
      - HELION_NODE_ID=e2e-node-1
      - HELION_COORDINATOR=coordinator:9090
      - HELION_ALLOW_ISOLATION=false
      - HELION_CA_CERT=/app/state/ca.pem
    volumes:
      - e2e-state:/app/state

  node2:
    # Override: use Rust runtime image so E2E tests exercise both runtimes.
    # node1 = Go runtime, node2 = Rust runtime (cgroup v2 + seccomp).
    build:
      context: .
      dockerfile: Dockerfile.node-rust
    environment:
      - PORT=8081
      - HELION_NODE_ID=e2e-node-2
      - HELION_COORDINATOR=coordinator:9090
      - HELION_ALLOW_ISOLATION=false
      - HELION_CA_CERT=/app/state/ca.pem
      - HELION_RUNTIME=rust
      - HELION_RUNTIME_SOCKET=/run/helion/runtime.sock
      - RUST_LOG=info
    volumes:
      - e2e-state:/app/state
