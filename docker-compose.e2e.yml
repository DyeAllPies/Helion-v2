# docker-compose.e2e.yml
#
# E2E test overlay — exposes the coordinator HTTP API on host port 8080
# and writes the root token to a mounted volume so Playwright can read it.
#
# IMPORTANT: This overlay replaces the host bind mount (./state) with a
# named Docker volume (e2e-state) so E2E tests use isolated storage and
# never read or pollute the user's local BadgerDB data. The volume is
# removed by `docker compose down -v`, giving each test run a clean DB.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.e2e.yml up -d
#   # wait for healthy, then run:  npx playwright test
#   docker compose -f docker-compose.yml -f docker-compose.e2e.yml down -v

name: helion-v2-e2e

volumes:
  e2e-state: {}
  e2e-analytics-pgdata: {}

services:
  coordinator:
    # NOTE: compose merge REPLACES the ports array, so we must list ALL
    # ports here — not just the ones being added.  Base has 9090 (gRPC);
    # this overlay adds 8080 (HTTP API for the dashboard).
    ports:
      - "127.0.0.1:9090:9090"   # gRPC
      - "127.0.0.1:8080:8080"   # HTTP API
    environment:
      - HELION_SCHEDULER=roundrobin
      - HELION_ROTATE_TOKEN=false
      - HELION_TOKEN_FILE=/app/state/root-token
      - HELION_DB_PATH=/app/state/db
      - HELION_EXTRA_SANS=coordinator
      - HELION_CA_FILE=/app/state/ca.pem
      # Feature 23 — keep REST on plain HTTP in this overlay so the
      # existing Playwright suite, the python submit.py scripts in
      # examples/ml-*, and the `curl -sS http://localhost:8080`
      # smoke checks in the docs all continue to work. The TLS path
      # is shipped and unit-tested (see tests/integration/security/
      # rest_tls_test.go); flipping the e2e suite to it is a
      # follow-up that lands with the batch e2e pass covering
      # features 22-28. Production coordinators SHOULD leave this
      # unset — the default-on posture is then active.
      - HELION_REST_TLS=off
      # Analytics pipeline enabled for E2E so the /api/analytics/* endpoints
      # are registered and the dashboard /analytics page has a real backend.
      - HELION_ANALYTICS_DSN=postgres://helion:secret@analytics-db:5432/helion_analytics?sslmode=disable
      - HELION_ANALYTICS_FLUSH_MS=200
      # Feature 11 — artifact store. E2E points at the compose-provisioned
      # MinIO (profile: ml) so ML-pipeline paths exercise the real
      # S3-compatible backend, not the local filesystem fallback. Nodes
      # inherit the same config below so uploads from the Stager land
      # where the coordinator expects to read them from.
      - HELION_ARTIFACTS_BACKEND=s3
      - HELION_ARTIFACTS_S3_ENDPOINT=minio:9000
      - HELION_ARTIFACTS_S3_BUCKET=helion
      - HELION_ARTIFACTS_S3_ACCESS_KEY=helion
      - HELION_ARTIFACTS_S3_SECRET_KEY=helion-dev-secret
      - HELION_ARTIFACTS_S3_USE_SSL=0
    volumes:
      - e2e-state:/app/state
      - ./logs:/app/logs
    depends_on:
      analytics-db:
        condition: service_healthy
      # Wait for the bucket bootstrap to finish so the first artifact
      # Put doesn't race against bucket creation. minio-bootstrap exits 0
      # when the bucket is ready.
      minio-bootstrap:
        condition: service_completed_successfully

  # Analytics PostgreSQL — required by the /api/analytics/* endpoints and
  # the dashboard /analytics page during E2E.  The "analytics" profile is
  # activated via COMPOSE_PROFILES in scripts/run-e2e.sh so this service
  # starts automatically for E2E runs.  The overlay overrides the volume
  # so the E2E run gets a clean database.
  analytics-db:
    volumes:
      - e2e-analytics-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helion -d helion_analytics"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 3s

  node1:
    environment:
      - PORT=8080
      - HELION_NODE_ID=e2e-node-1
      - HELION_COORDINATOR=coordinator:9090
      - HELION_ALLOW_ISOLATION=false
      - HELION_CA_CERT=/app/state/ca.pem
      # Feature 11 — Stager uses the same S3 backend as the coordinator,
      # so node-side VerifyStore at startup talks to the compose MinIO
      # and output uploads land in the same bucket the coordinator reads
      # from. Missing this causes the node to fall back to LocalStore
      # and break every artifact-bearing workflow silently.
      - HELION_ARTIFACTS_BACKEND=s3
      - HELION_ARTIFACTS_S3_ENDPOINT=minio:9000
      - HELION_ARTIFACTS_S3_BUCKET=helion
      - HELION_ARTIFACTS_S3_ACCESS_KEY=helion
      - HELION_ARTIFACTS_S3_SECRET_KEY=helion-dev-secret
      - HELION_ARTIFACTS_S3_USE_SSL=0
    volumes:
      - e2e-state:/app/state
    depends_on:
      minio-bootstrap:
        condition: service_completed_successfully

  node2:
    # Override: use Rust runtime image so E2E tests exercise both runtimes.
    # node1 = Go runtime, node2 = Rust runtime (cgroup v2 + seccomp).
    build:
      context: .
      dockerfile: Dockerfile.node-rust
    environment:
      - PORT=8081
      - HELION_NODE_ID=e2e-node-2
      - HELION_COORDINATOR=coordinator:9090
      - HELION_ALLOW_ISOLATION=false
      - HELION_CA_CERT=/app/state/ca.pem
      - HELION_RUNTIME=rust
      - HELION_RUNTIME_SOCKET=/run/helion/runtime.sock
      - RUST_LOG=info
      # Feature 11 — same S3 backend as node1; see the node1 env block
      # for the rationale. Both nodes share one bucket so an artifact
      # produced on one node is readable from the other when a
      # downstream workflow job lands there.
      - HELION_ARTIFACTS_BACKEND=s3
      - HELION_ARTIFACTS_S3_ENDPOINT=minio:9000
      - HELION_ARTIFACTS_S3_BUCKET=helion
      - HELION_ARTIFACTS_S3_ACCESS_KEY=helion
      - HELION_ARTIFACTS_S3_SECRET_KEY=helion-dev-secret
      - HELION_ARTIFACTS_S3_USE_SSL=0
    volumes:
      - e2e-state:/app/state
    depends_on:
      minio-bootstrap:
        condition: service_completed_successfully
