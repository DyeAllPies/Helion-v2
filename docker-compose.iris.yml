# docker-compose.iris.yml — iris end-to-end demo overlay (feature 19).
#
# Layers on top of docker-compose.yml + docker-compose.e2e.yml to:
#   1. Swap both nodes to the Python-capable image
#      (Dockerfile.node-python) that ships the iris pipeline's deps.
#   2. Inject HELION_COORDINATOR + HELION_TOKEN into each node's env
#      so the iris subprocess jobs (register.py, etc.) can POST back
#      to the registry endpoints. Token is read from the shared
#      /app/state volume that the coordinator writes at startup.
#   3. Override node2 to use the Python Dockerfile rather than the
#      Rust runtime one — the iris demo is single-runtime.
#
# Usage (from a clean checkout):
#   rm -rf state/ && mkdir -p state logs
#   COMPOSE_PROFILES=analytics,ml \
#     docker compose -f docker-compose.yml \
#                    -f docker-compose.e2e.yml \
#                    -f docker-compose.iris.yml \
#                    up -d --build
#
# Nodes wait for the coordinator to be healthy before starting so the
# root-token file is guaranteed readable.

name: helion-v2-e2e

services:
  node1:
    build:
      context: .
      dockerfile: Dockerfile.node-python
    entrypoint:
      - /bin/sh
      - -c
      - |
        # The coordinator writes the root token to /app/state/root-token
        # at startup (HELION_TOKEN_FILE in docker-compose.e2e.yml).
        # depends_on: service_healthy gates this, but a 500ms belt-and-
        # braces wait handles the narrow window between healthcheck
        # success and the token file being fsync'd.
        until [ -s /app/state/root-token ]; do sleep 0.2; done
        export HELION_TOKEN="$$(cat /app/state/root-token)"
        # HELION_COORDINATOR stays as coordinator:9090 (gRPC) for the
        # node binary. HELION_API_URL is the iris scripts' HTTP base.
        export HELION_API_URL="http://coordinator:8080"
        exec /usr/local/bin/helion-node
    depends_on:
      coordinator:
        # service_started not service_healthy — the coordinator's
        # container healthcheck has a known wget/IPv6 quirk that
        # marks it unhealthy even when the HTTP API is responsive.
        # The entrypoint above polls for /app/state/root-token to
        # gate readiness regardless.
        condition: service_started

  node2:
    build:
      context: .
      dockerfile: Dockerfile.node-python
    entrypoint:
      - /bin/sh
      - -c
      - |
        until [ -s /app/state/root-token ]; do sleep 0.2; done
        export HELION_TOKEN="$$(cat /app/state/root-token)"
        # HELION_COORDINATOR stays as coordinator:9090 (gRPC) for the
        # node binary. HELION_API_URL is the iris scripts' HTTP base.
        export HELION_API_URL="http://coordinator:8080"
        exec /usr/local/bin/helion-node
    # Override the Rust runtime env the e2e overlay sets — the iris
    # demo is single-runtime. Keep the S3 backend wiring from the
    # e2e overlay so artifact uploads land in MinIO.
    environment:
      - PORT=8081
      - HELION_NODE_ID=iris-node-2
      - HELION_COORDINATOR=coordinator:9090
      - HELION_ALLOW_ISOLATION=false
      - HELION_CA_CERT=/app/state/ca.pem
      - HELION_RUNTIME=go
      - HELION_ARTIFACTS_BACKEND=s3
      - HELION_ARTIFACTS_S3_ENDPOINT=minio:9000
      - HELION_ARTIFACTS_S3_BUCKET=helion
      - HELION_ARTIFACTS_S3_ACCESS_KEY=helion
      - HELION_ARTIFACTS_S3_SECRET_KEY=helion-dev-secret
      - HELION_ARTIFACTS_S3_USE_SSL=0
    depends_on:
      coordinator:
        # service_started not service_healthy — the coordinator's
        # container healthcheck has a known wget/IPv6 quirk that
        # marks it unhealthy even when the HTTP API is responsive.
        # The entrypoint above polls for /app/state/root-token to
        # gate readiness regardless.
        condition: service_started
      minio-bootstrap:
        condition: service_completed_successfully
