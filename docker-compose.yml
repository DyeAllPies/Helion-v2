# NOTE: ./state is a host bind mount — it survives `docker compose down -v`.
# To get a truly clean cluster (no jobs/workflows from prior runs), delete it:
#   rm -rf state/
name: helion-v2

services:
  coordinator:
    build:
      context: .
      dockerfile: Dockerfile.coordinator
    container_name: helion-coordinator
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - helion-net
    volumes:
      - ./state:/app/state
      - ./logs:/app/logs
    environment:
      - HELION_SCHEDULER=roundrobin
      # Set HELION_ANALYTICS_DSN to enable the analytics pipeline.
      # Uncomment (or use --profile analytics) to connect to the analytics-db:
      # - HELION_ANALYTICS_DSN=postgres://helion:secret@analytics-db:5432/helion_analytics?sslmode=disable
    restart: "no"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9090/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  node1:
    build:
      context: .
      dockerfile: Dockerfile.node
    container_name: helion-node-1
    networks:
      - helion-net
    volumes:
      - ./state:/app/state
      - ./logs:/app/logs
    environment:
      - PORT=8080
      - HELION_COORDINATOR=coordinator:9090
      - HELION_ALLOW_ISOLATION=false
    depends_on:
      coordinator:
        condition: service_started
    restart: "no"

  node2:
    build:
      context: .
      dockerfile: Dockerfile.node
    container_name: helion-node-2
    networks:
      - helion-net
    volumes:
      - ./state:/app/state
      - ./logs:/app/logs
    environment:
      - PORT=8081
      - HELION_COORDINATOR=coordinator:9090
      - HELION_ALLOW_ISOLATION=false
    depends_on:
      coordinator:
        condition: service_started
    restart: "no"

  # ── Analytics PostgreSQL (opt-in) ──────────────────────────────────────
  # Start with: docker compose --profile analytics up
  # The coordinator connects only when HELION_ANALYTICS_DSN is set.
  analytics-db:
    image: postgres:16-alpine
    container_name: helion-analytics-db
    profiles: ["analytics"]
    networks:
      - helion-net
    environment:
      POSTGRES_DB: helion_analytics
      POSTGRES_USER: helion
      POSTGRES_PASSWORD: secret
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - analytics_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helion -d helion_analytics"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  analytics_pgdata:

networks:
  helion-net:
    driver: bridge
    internal: false