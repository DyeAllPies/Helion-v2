# NOTE: ./state is a host bind mount — it survives `docker compose down -v`.
# To get a truly clean cluster (no jobs/workflows from prior runs), delete it:
#   rm -rf state/
name: helion-v2

services:
  coordinator:
    build:
      context: .
      dockerfile: Dockerfile.coordinator
    container_name: helion-coordinator
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - helion-net
    volumes:
      - ./state:/app/state
      - ./logs:/app/logs
    environment:
      - HELION_SCHEDULER=roundrobin
      # Set HELION_ANALYTICS_DSN to enable the analytics pipeline.
      # Uncomment (or use --profile analytics) to connect to the analytics-db:
      # - HELION_ANALYTICS_DSN=postgres://helion:secret@analytics-db:5432/helion_analytics?sslmode=disable
    restart: "no"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9090/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  node1:
    build:
      context: .
      dockerfile: Dockerfile.node
    container_name: helion-node-1
    networks:
      - helion-net
    volumes:
      - ./state:/app/state
      - ./logs:/app/logs
    environment:
      - PORT=8080
      - HELION_COORDINATOR=coordinator:9090
      - HELION_ALLOW_ISOLATION=false
    depends_on:
      coordinator:
        condition: service_started
    restart: "no"

  node2:
    build:
      context: .
      dockerfile: Dockerfile.node
    container_name: helion-node-2
    networks:
      - helion-net
    volumes:
      - ./state:/app/state
      - ./logs:/app/logs
    environment:
      - PORT=8081
      - HELION_COORDINATOR=coordinator:9090
      - HELION_ALLOW_ISOLATION=false
    depends_on:
      coordinator:
        condition: service_started
    restart: "no"

  # ── Analytics PostgreSQL (opt-in) ──────────────────────────────────────
  # Start with: docker compose --profile analytics up
  # The coordinator connects only when HELION_ANALYTICS_DSN is set.
  analytics-db:
    image: postgres:16-alpine
    container_name: helion-analytics-db
    profiles: ["analytics"]
    networks:
      - helion-net
    environment:
      POSTGRES_DB: helion_analytics
      POSTGRES_USER: helion
      POSTGRES_PASSWORD: secret
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - analytics_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helion -d helion_analytics"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ── ML-pipeline artifact store (opt-in) ─────────────────────────────────
  # Start with: docker compose --profile ml up
  # Nodes connect only when HELION_ARTIFACTS_BACKEND=s3 is set. The
  # non-SSL endpoint is fine for dev — the S3Store logs a WARN at
  # startup to make sure a production deploy notices.
  minio:
    image: minio/minio:latest
    container_name: helion-minio
    profiles: ["ml"]
    networks:
      - helion-net
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000" # S3 API
      - "127.0.0.1:9001:9001" # web console
    environment:
      MINIO_ROOT_USER: helion
      MINIO_ROOT_PASSWORD: helion-dev-secret
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # One-shot bootstrapper: creates the `helion` bucket if it doesn't
  # exist. Runs once against minio, then exits. Not a long-running
  # service — kept in the ml profile so the main up path isn't
  # blocked by it.
  minio-bootstrap:
    image: minio/mc:latest
    container_name: helion-minio-bootstrap
    profiles: ["ml"]
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - helion-net
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 helion helion-dev-secret &&
      mc mb --ignore-existing local/helion &&
      echo 'bucket ready: local/helion'
      "
    restart: "no"

volumes:
  analytics_pgdata:
  minio_data:

networks:
  helion-net:
    driver: bridge
    internal: false