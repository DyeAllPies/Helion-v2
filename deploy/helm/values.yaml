## Helion v2 Helm chart default values

coordinator:
  image:
    repository: helion-coordinator
    tag: latest
    pullPolicy: IfNotPresent

  replicaCount: 1

  service:
    grpcPort: 9090
    httpPort: 8080

  env:
    dbPath: /var/lib/helion/db
    grpcAddr: "0.0.0.0:9090"
    httpAddr: "0.0.0.0:8080"
    heartbeatSec: "10"
    scheduler: "round-robin"
    rateLimitRps: "10"

  persistence:
    enabled: true
    storageClass: ""   # "" uses the cluster default StorageClass
    size: 1Gi
    accessMode: ReadWriteOnce

  ingress:
    enabled: false
    className: ""
    host: helion.local
    annotations: {}
    tls: []

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000

  serviceAccount:
    create: true
    name: ""
    annotations: {}

serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  # Extra labels so the Prometheus Operator's label selector can find this ServiceMonitor.
  # Match whatever your Prometheus CR sets in spec.serviceMonitorSelector.
  # e.g. labels: { release: prometheus }
  labels: {}

node:
  image:
    repository: helion-node
    tag: latest
    pullPolicy: IfNotPresent

  env:
    port: "8080"
    allowIsolation: "false"

  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

  securityContext:
    runAsNonRoot: true
    runAsUser: 1000

  serviceAccount:
    create: true
    name: ""
    annotations: {}

  # Tolerations so node agents run on control-plane nodes too (useful for k3s single-node)
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule

  updateStrategy:
    type: RollingUpdate