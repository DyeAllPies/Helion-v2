apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "helion.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "helion.labels" . | nindent 4 }}
data:
  HELION_DB_PATH: {{ .Values.coordinator.env.dbPath | quote }}
  HELION_GRPC_ADDR: {{ .Values.coordinator.env.grpcAddr | quote }}
  HELION_HTTP_ADDR: {{ .Values.coordinator.env.httpAddr | quote }}
  HELION_HEARTBEAT_SEC: {{ .Values.coordinator.env.heartbeatSec | quote }}
  HELION_SCHEDULER: {{ .Values.coordinator.env.scheduler | quote }}
  HELION_RATE_LIMIT_RPS: {{ .Values.coordinator.env.rateLimitRps | quote }}