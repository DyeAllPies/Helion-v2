apiVersion: v1
kind: Secret
metadata:
  name: {{ include "helion.fullname" . }}-coordinator
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "helion.labels" . | nindent 4 }}
    app.kubernetes.io/component: coordinator
  annotations:
    helm.sh/resource-policy: keep  # Preserve across upgrades — contains root JWT token
type: Opaque
# No data pre-seeded; the coordinator generates and persists its own JWT secret
# in BadgerDB on first start. This Secret exists so RBAC grants are well-formed.
data: {}