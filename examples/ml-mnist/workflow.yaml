# MNIST-784 parallel-training end-to-end workflow.
#
# Five-stage DAG that demonstrates every observable property of
# the orchestrator in a single run:
#
#   ingest       ─┐
#                 ├→ preprocess ─┬→ train_light (Go)  ─┐
#                                │                      ├→ compare (Go)
#                                └→ train_heavy (Rust) ─┘
#
# - ingest + preprocess are the cheap orchestration steps, both on
#   Go-runtime nodes (node_selector: {runtime: go}).
# - train_light + train_heavy run in PARALLEL on different runtime
#   nodes with intentionally asymmetric input sizes (feature 43):
#   light on Go trains on 1 000 rows × 50 iters (~1–2 s fit) while
#   heavy on Rust trains on 20 000 rows × 400 iters (~30–60 s fit).
#   The Jobs page shows both with DIFFERENT node_id columns at the
#   same moment — that's the heterogeneous-dispatch visual. The
#   wide wall-clock gap makes the "heavy is doing real work" beat
#   land on video, and gives feature 42's overlap assertion ample
#   margin.
# - compare consumes BOTH trained models, picks the winner by
#   test-set accuracy, and registers both against the registry
#   with a `winner=true|false` tag on each. See examples/ml-mnist/
#   compare.py for the full flow.
#
# Workflow-level analytics (feature 40): when the last job
# transitions to terminal, the coordinator emits a
# workflow.completed event. The analytics sink's
# upsertWorkflowOutcome handler inserts a denormalised row into
# workflow_outcomes (workflow_id, started_at, completed_at,
# job_count, success_count, failed_count, duration_ms). The
# Playwright spec e2e/specs/ml-mnist-parallel-walkthrough asserts
# this row exists after the run — that's the "analytics page
# confirms the run" beat of the demo.
#
# Heterogeneous scheduling (feature 21): each job declares a
# `node_selector: { runtime: <go|rust> }` label. The Rust runtime
# subprocess runs with env_clear() so PATH is injected explicitly
# below (submit.py does the same for the top-level API submit).

id: mnist-wf-1
name: mnist-parallel-heterogeneous
priority: 50

jobs:
  - name: ingest
    command: python
    args: [/app/ml-mnist/ingest.py]
    timeout_seconds: 180
    node_selector:
      runtime: go
    outputs:
      - name: RAW_CSV
        local_path: raw.csv

  - name: preprocess
    command: python
    args: [/app/ml-mnist/preprocess.py]
    # Heavy-variant subsample is up to 24 000 rows (20k train + 4k test);
    # keep ample headroom on the default 60 s cap since parquet writes
    # dominate wall-clock here on slow disks.
    timeout_seconds: 120
    depends_on: [ingest]
    node_selector:
      runtime: go
    env:
      # Feature 43: per-variant subsample sizes give the parallel
      # train fork a visibly asymmetric wall-clock footprint without
      # changing dataset shape — apples-to-apples accuracy compare
      # stays valid (compare.py reads metrics.json from each side).
      HELION_PREPROCESS_SAMPLES_LIGHT: "1000"
      HELION_PREPROCESS_SAMPLES_HEAVY: "20000"
    inputs:
      - name: RAW_CSV
        from: ingest.RAW_CSV
        local_path: raw.csv
    outputs:
      - name: TRAIN_LIGHT_PARQUET
        local_path: train_light.parquet
      - name: TEST_LIGHT_PARQUET
        local_path: test_light.parquet
      - name: TRAIN_HEAVY_PARQUET
        local_path: train_heavy.parquet
      - name: TEST_HEAVY_PARQUET
        local_path: test_heavy.parquet

  # ── Parallel training (feature 21 heterogeneous dispatch) ─────
  #
  # Both train_* jobs depend ONLY on preprocess, so the scheduler
  # dispatches them concurrently. The runtime split lands light
  # on Go and heavy on Rust, which the Jobs page renders with
  # different node_id + runtime columns side-by-side.
  - name: train_light
    command: python
    args: [/app/ml-mnist/train.py]
    # 1 000 train rows × 50 iters lands well under 30 s on any runner.
    timeout_seconds: 120
    depends_on: [preprocess]
    node_selector:
      runtime: go
    env:
      HELION_TRAIN_MAX_ITER: "50"
      HELION_TRAIN_VARIANT: light
    inputs:
      - name: TRAIN_PARQUET
        from: preprocess.TRAIN_LIGHT_PARQUET
        local_path: train.parquet
      - name: TEST_PARQUET
        from: preprocess.TEST_LIGHT_PARQUET
        local_path: test.parquet
    outputs:
      - name: MODEL
        local_path: model.joblib
      - name: METRICS
        local_path: metrics.json

  - name: train_heavy
    command: python
    args: [/app/ml-mnist/train.py]
    # 20 000 train rows × 400 iters runs ~30–60 s on the Rust runner;
    # 5× the timeout_seconds budget absorbs outliers without masking
    # a real hang.
    timeout_seconds: 600
    depends_on: [preprocess]
    node_selector:
      runtime: rust
    env:
      HELION_TRAIN_MAX_ITER: "400"
      HELION_TRAIN_VARIANT: heavy
    inputs:
      - name: TRAIN_PARQUET
        from: preprocess.TRAIN_HEAVY_PARQUET
        local_path: train.parquet
      - name: TEST_PARQUET
        from: preprocess.TEST_HEAVY_PARQUET
        local_path: test.parquet
    outputs:
      - name: MODEL
        local_path: model.joblib
      - name: METRICS
        local_path: metrics.json

  # ── Compare + register (merge step) ───────────────────────────
  #
  # Reads BOTH trained-model metrics, picks the higher-accuracy
  # variant, POSTs both model records to the registry with a
  # `winner=true|false` tag. Emits a comparison summary for the
  # dashboard to pick up from workflow lineage.
  - name: compare
    command: python
    args: [/app/ml-mnist/compare.py]
    timeout_seconds: 60
    depends_on: [train_light, train_heavy]
    node_selector:
      runtime: go
    env:
      HELION_WORKFLOW_ID: mnist-wf-1
      HELION_TRAIN_LIGHT_JOB_NAME: train_light
      HELION_TRAIN_HEAVY_JOB_NAME: train_heavy
    inputs:
      - name: RAW_CSV
        from: ingest.RAW_CSV
        local_path: raw.csv
      - name: MODEL_LIGHT
        from: train_light.MODEL
        local_path: model_light.joblib
      - name: MODEL_HEAVY
        from: train_heavy.MODEL
        local_path: model_heavy.joblib
      - name: METRICS_LIGHT
        from: train_light.METRICS
        local_path: metrics_light.json
      - name: METRICS_HEAVY
        from: train_heavy.METRICS
        local_path: metrics_heavy.json
    outputs:
      - name: COMPARISON
        local_path: comparison.json
